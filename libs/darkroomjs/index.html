<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>DarkroomJS</title>
  <link rel="stylesheet" href="darkroom.css">
  <link rel="stylesheet" href="darkroom.custom.css">
</head>

<body>
  <div id="content">
    <div class="container">
      <section class="copy">
        <div class="figure-wrapper">
          <figure class="image-container target">
            <img src="./images/domokun-big.jpg" alt="DomoKun" id="target">
          </figure>
        </div>

      </section>
    </div>
  </div>

  <script src="fabric.js"></script>
  <script src="darkroom.js"></script>

  <script>
    var dkrm = new Darkroom('#target', {
      // Size options
      minWidth: 600,
      minHeight: 500,
      maxWidth: 600,
      maxHeight: 500,
      ratio: 4 / 3,
      backgroundColor: '#000',

      // Plugins options
      plugins: {
        //save: false,
        crop: {
          quickCropKey: 67, //key "c"
          minHeight: 50,
          minWidth: 50,
          ratio: 4 / 4
        }
      }
    });
  </script>
</body>

</html>
